<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — MMU Lost & Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="text-center px-6">
        <div class="w-24 h-24 bg-gray-100 rounded-3xl flex items-center
                    justify-center mx-auto mb-6">
            <svg class="w-12 h-12 text-gray-300" fill="none"
                 stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                      stroke-width="2"
                      d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
        </div>
        <h1 class="text-6xl font-bold text-gray-900 mb-3">404</h1>
        <h2 class="text-xl font-semibold text-gray-700 mb-2">
            Page not found</h2>
        <p class="text-gray-400 text-sm mb-8">
            The page you are looking for does not exist or has been moved.</p>
        <div class="flex gap-3 justify-center">
            <a href="/"
               class="bg-green-500 hover:bg-green-600 text-white font-semibold
                      px-6 py-3 rounded-xl transition-colors text-sm">
                Go Home
            </a>
            <a href="/dashboard/"
               class="border border-gray-200 hover:bg-gray-50 text-gray-700
                      font-semibold px-6 py-3 rounded-xl transition-colors
                      text-sm">
                Dashboard
            </a>
        </div>
    </div>
</body>
</html>
