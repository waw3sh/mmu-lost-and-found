{% extends 'base.html' %}
{% block title %}Invalid QR — MMU Lost & Found{% endblock %}
{% block content %}
<div class="min-h-screen bg-gray-50 flex items-center justify-center px-4">
    <div class="max-w-md w-full text-center">
        <div class="w-20 h-20 bg-red-100 rounded-full flex items-center
                    justify-center mx-auto mb-6">
            <svg class="w-10 h-10 text-red-400" fill="none"
                 stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                      stroke-width="2"
                      d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9
                         0 11-18 0 9 9 0 0118 0z"/>
            </svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-900 mb-3">
            QR Code Not Recognised</h1>
        <p class="text-gray-500">
            This QR code is not in our system. It may have been
            deactivated or is invalid.
        </p>
    </div>
</div>
{% endblock %}
