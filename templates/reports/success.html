{% extends 'base.html' %}
{% block title %}Owner Notified — MMU Lost & Found{% endblock %}
{% block content %}
<div class="min-h-screen bg-gray-50 flex items-center justify-center px-4">
    <div class="max-w-md w-full text-center">
        <div class="w-20 h-20 bg-green-100 rounded-full flex items-center
                    justify-center mx-auto mb-6">
            <svg class="w-10 h-10 text-green-500" fill="none"
                 stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                      stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-900 mb-2">Owner Notified!</h1>
        <p class="text-gray-500 mb-2">
            Thank you! The owner of
            <strong class="text-gray-700">{{ item_name }}</strong>
            has been sent an alert and will arrange to collect it soon.
        </p>
        <p class="text-3xl mb-8">🙏</p>
        <p class="text-gray-400 text-sm font-medium">You're a good person.</p>
        <div class="mt-12 pt-6 border-t border-gray-100">
            <span class="text-xs text-gray-400">MMU Lost & Found System</span>
        </div>
    </div>
</div>
{% endblock %}
