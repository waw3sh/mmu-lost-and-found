{% extends 'base.html' %}
{% block title %}Already Recovered — MMU Lost & Found{% endblock %}
{% block content %}
<div class="min-h-screen bg-gray-50 flex items-center justify-center px-4">
    <div class="max-w-md w-full text-center">
        <div class="w-20 h-20 bg-blue-100 rounded-full flex items-center
                    justify-center mx-auto mb-6">
            <svg class="w-10 h-10 text-blue-500" fill="none"
                 stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                      stroke-width="2"
                      d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-900 mb-3">
            Already Recovered</h1>
        <p class="text-gray-500">
            <strong>{{ item.name }}</strong> has already been recovered
            by its owner. Thank you for your honesty! 😊
        </p>
    </div>
</div>
{% endblock %}
