<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error — MMU Lost & Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="text-center px-6">
        <div class="w-24 h-24 bg-red-100 rounded-3xl flex items-center
                    justify-center mx-auto mb-6">
            <svg class="w-12 h-12 text-red-400" fill="none"
                 stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                      stroke-width="2"
                      d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0
                         2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694
                         -1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
            </svg>
        </div>
        <h1 class="text-6xl font-bold text-gray-900 mb-3">500</h1>
        <h2 class="text-xl font-semibold text-gray-700 mb-2">
            Something went wrong</h2>
        <p class="text-gray-400 text-sm mb-8">
            Our server encountered an error. Please try again in a moment.</p>
        <a href="/"
           class="bg-green-500 hover:bg-green-600 text-white font-semibold
                  px-6 py-3 rounded-xl transition-colors text-sm">
            Go Home
        </a>
    </div>
</body>
</html>
